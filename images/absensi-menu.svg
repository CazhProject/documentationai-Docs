<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <rect width="1200" height="675" rx="12" fill="#f4f7f8"/>
  <!-- sidebar -->
  <rect x="0" y="0" width="260" height="675" fill="#01718f"/>
  <rect x="24" y="28" width="120" height="22" rx="6" fill="#ffffff" opacity="0.9"/>
  <rect x="24" y="96" width="212" height="36" rx="8" fill="#ffffff" opacity="0.12"/>
  <text x="44" y="120" fill="#cfeaf2" font-size="16">Dashboard</text>
  <rect x="24" y="144" width="212" height="36" rx="8" fill="#ffffff" opacity="0.28"/>
  <text x="44" y="168" fill="#ffffff" font-size="16" font-weight="600">Absensi</text>
  <circle cx="250" cy="162" r="16" fill="#ffb020"/>
  <text x="250" y="168" fill="#1a1a1a" font-size="16" font-weight="700" text-anchor="middle">1</text>
  <rect x="24" y="192" width="212" height="36" rx="8" fill="#ffffff" opacity="0.12"/>
  <text x="44" y="216" fill="#cfeaf2" font-size="16">Keuangan</text>
  <rect x="24" y="240" width="212" height="36" rx="8" fill="#ffffff" opacity="0.12"/>
  <text x="44" y="264" fill="#cfeaf2" font-size="16">Pengumuman</text>
  <!-- content -->
  <text x="300" y="70" fill="#1f2a2e" font-size="24" font-weight="700">Absensi</text>
  <!-- type selector -->
  <rect x="300" y="96" width="180" height="44" rx="10" fill="#01718f"/>
  <text x="390" y="124" fill="#ffffff" font-size="16" text-anchor="middle">Harian</text>
  <rect x="492" y="96" width="180" height="44" rx="10" fill="#ffffff" stroke="#c6d6dc"/>
  <text x="582" y="124" fill="#41505b" font-size="16" text-anchor="middle">Terjadwal</text>
  <circle cx="692" cy="96" r="16" fill="#ffb020"/>
  <text x="692" y="102" fill="#1a1a1a" font-size="16" font-weight="700" text-anchor="middle">2</text>
  <!-- student rows -->
  <g fill="#ffffff" stroke="#dde5e8">
    <rect x="300" y="170" width="840" height="56" rx="10"/>
    <rect x="300" y="238" width="840" height="56" rx="10"/>
    <rect x="300" y="306" width="840" height="56" rx="10"/>
    <rect x="300" y="374" width="840" height="56" rx="10"/>
  </g>
  <g fill="#33414c" font-size="16">
    <text x="324" y="204">Aisyah Putri</text>
    <text x="324" y="272">Bima Saputra</text>
    <text x="324" y="340">Citra Lestari</text>
    <text x="324" y="408">Dimas Ramadhan</text>
  </g>
  <!-- status pills row 1 -->
  <g font-size="13" text-anchor="middle">
    <rect x="770" y="184" width="76" height="30" rx="15" fill="#01718f"/>
    <text x="808" y="204" fill="#ffffff">Hadir</text>
    <rect x="856" y="184" width="76" height="30" rx="15" fill="#eef2f4"/>
    <text x="894" y="204" fill="#5a6a72">Sakit</text>
    <rect x="942" y="184" width="76" height="30" rx="15" fill="#eef2f4"/>
    <text x="980" y="204" fill="#5a6a72">Izin</text>
    <rect x="1028" y="184" width="76" height="30" rx="15" fill="#eef2f4"/>
    <text x="1066" y="204" fill="#5a6a72">Alpa</text>
  </g>
  <!-- save button -->
  <rect x="1000" y="586" width="140" height="48" rx="10" fill="#01718f"/>
  <text x="1070" y="616" fill="#ffffff" font-size="17" font-weight="600" text-anchor="middle">Simpan</text>
  <!-- placeholder note -->
  <text x="300" y="620" fill="#8aa0a8" font-size="14">Ilustrasi placeholder — akan diganti screenshot asli</text>
